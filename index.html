<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Match Workshop</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --muted: #888;
  --faint: #bbb;
  --chip: #f1f1f1;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-pill: 99px;
  --accent: #2a6fdb;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111113;
    --surface: #1c1c1e;
    --border: #2e2e30;
    --text: #f0f0f0;
    --muted: #888;
    --faint: #555;
    --chip: #2a2a2c;
  }
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}

.app {
  max-width: 560px;
  margin: 0 auto;
  padding: 1.25rem 1rem 3rem;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 1.25rem;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header span { font-size: 13px; color: var(--muted); }

/* Primaries reference card */
.primaries-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}
.palette-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
}
.primaries-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
}
.primary-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.primary-dot {
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.primary-dot.white-dot { border: 1px solid var(--border); }
.primary-name {
  font-size: 9px;
  text-align: center;
  color: var(--muted);
  line-height: 1.2;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

/* Search card */
.search-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.input-row input[type="text"] {
  flex: 1;
  min-width: 0;
  padding: 10px 12px;
  font-size: 15px;
  font-family: monospace;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  -webkit-appearance: none;
  appearance: none;
  letter-spacing: 0.05em;
}
.input-row input[type="text"]::placeholder { color: var(--faint); font-family: inherit; letter-spacing: 0; }
.input-row input[type="text"]:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
.input-row input[type="color"] {
  width: 44px;
  height: 42px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: none;
  cursor: pointer;
  padding: 2px;
  flex-shrink: 0;
  -webkit-appearance: none;
  appearance: none;
}
.btn {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  flex-shrink: 0;
}
.btn:active { opacity: 0.7; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.error { font-size: 13px; color: #b91c1c; margin-top: 8px; }
.note  { font-size: 12px; color: var(--faint); margin-top: 8px; font-style: italic; }

/* Preview */
.preview {
  border-radius: var(--radius-md);
  height: 80px;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  background: var(--chip);
  transition: background 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.preview-label {
  font-size: 13px;
  font-family: monospace;
  color: rgba(255,255,255,0.8);
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  letter-spacing: 0.08em;
  display: none;
}

/* Result card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}
.color-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.swatch {
  width: 52px;
  height: 52px;
  flex-shrink: 0;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chip);
  transition: background 0.3s;
}
.color-name { font-size: 16px; font-weight: 600; }
.color-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; }
.color-hex  { font-size: 12px; font-family: monospace; color: var(--faint); margin-top: 2px; }

.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
  gap: 8px;
  margin-top: 1rem;
}
.recipe-cell {
  background: var(--chip);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
  position: relative;
}
.recipe-color-bar {
  width: 100%;
  height: 4px;
  border-radius: 2px;
  margin-bottom: 7px;
}
.recipe-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--faint);
}
.recipe-val {
  font-size: 17px;
  font-weight: 600;
  margin-top: 3px;
  color: var(--text);
}

.unmakeable {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px;
  background: #fff8f0;
  border: 1px solid #fdd5a0;
  border-radius: var(--radius-sm);
  margin-top: 1rem;
}
@media (prefers-color-scheme: dark) {
  .unmakeable { background: #2a1f0e; border-color: #6b4100; }
}
.unmakeable-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
.unmakeable-text { font-size: 13px; line-height: 1.6; color: var(--text); }
.unmakeable-text strong { font-weight: 600; }

.hint { font-size: 12px; color: var(--faint); margin-top: 10px; }
.empty {
  font-size: 14px;
  color: var(--faint);
  text-align: center;
  padding: 1.5rem 0;
}
.match-quality {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: var(--radius-pill);
  margin-top: 5px;
  border: 1px solid var(--border);
}
.quality-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Scale */
.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.scale-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.scale-row input[type="number"] {
  width: 100px;
  padding: 9px 12px;
  font-size: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  -webkit-appearance: none;
  appearance: none;
}
.scale-row input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
.scale-row .unit { font-size: 13px; color: var(--muted); }
.pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.pill {
  font-size: 13px;
  padding: 5px 11px;
  border-radius: var(--radius-pill);
  background: var(--chip);
  color: var(--muted);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pill strong { font-weight: 600; color: var(--text); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Match (Workshop Version)</h1>
    <span>by Creatis</span>
  </div>

  <!-- Primaries reference -->
  <div class="primaries-card">
    <div class="palette-label">Available primaries</div>
    <div class="primaries-grid" id="primariesGrid"></div>
  </div>

  <!-- Hex input -->
  <div class="search-card">
    <div class="palette-label">Enter target color</div>
    <div class="input-row">
      <input type="color" id="colorPicker" value="#e2725b" oninput="onPickerChange(this.value)" />
      <input type="text" id="hexInput" placeholder="#E2725B" maxlength="7"
        oninput="onHexType(this.value)"
        onkeydown="if(event.key==='Enter') generateRecipe()" />
      <button class="btn btn-primary" onclick="generateRecipe()">Match</button>
    </div>
    <div id="searcherr" class="error"></div>
    <p class="note">Colors on screen may differ from physical paint results.</p>
  </div>

  <!-- Preview bar -->
  <div id="preview" class="preview">
    <span id="previewLabel" class="preview-label"></span>
  </div>

  <!-- Result -->
  <div class="card">
    <div id="empty" class="empty">Enter a hex code above to generate a mixing recipe.</div>
    <div id="meta" style="display:none">
      <div class="color-row">
        <div id="swatch" class="swatch"></div>
        <div>
          <div id="cname" class="color-name"></div>
          <div id="csub"  class="color-sub"></div>
          <div id="chex"  class="color-hex"></div>
          <div id="cquality"></div>
        </div>
      </div>
      <div id="rgrid" class="recipe-grid"></div>
      <div id="unmakeable-box" style="display:none" class="unmakeable">
        <span class="unmakeable-icon">⚠</span>
        <div class="unmakeable-text" id="unmakeable-msg"></div>
      </div>
      <p class="hint" id="recipe-hint"></p>
    </div>
  </div>

  <!-- Scale -->
  <div class="card" id="scaleCard" style="display:none">
    <div class="section-label">Scale recipe</div>
    <div class="scale-row">
      <input id="vol" type="number" inputmode="decimal" value="100" min="1" />
      <span class="unit">ml white base</span>
      <button class="btn" onclick="doScale()">Scale</button>
    </div>
    <div id="pills" class="pills"></div>
  </div>

</div>
<script>
/* ── 8 pigment primaries — White is the base, not listed here ── */
const PRIMARIES = [
  { name:"Yellow", hex:"#F5C518" },
  { name:"Orange", hex:"#F07020" },
  { name:"Red",    hex:"#D0231A" },
  { name:"Blue",   hex:"#1A52B0" },
  { name:"Purple", hex:"#6B3A9E" },
  { name:"Black",  hex:"#1A1A1A" },
  { name:"Green",  hex:"#2E8B3A" },
  { name:"Brown",  hex:"#7B4A1E" }
];
const WHITE = { r:255, g:255, b:255 };

/* Build primaries reference strip */
const pg = document.getElementById("primariesGrid");
PRIMARIES.forEach(p => {
  const chip = document.createElement("div");
  chip.className = "primary-chip";
  chip.innerHTML = `<div class="primary-dot" style="background:${p.hex}"></div>
    <div class="primary-name">${p.name}</div>`;
  pg.appendChild(chip);
});

let current = null;

/* ── Colour math ── */
function hexToRgb(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}
function rgbDist(a, b) {
  const dr=a.r-b.r, dg=a.g-b.g, db=a.b-b.b;
  return Math.sqrt(dr*dr + dg*dg + db*db);
}

/*
  Model: final color = mix of WHITE base + pigments added into it.
  Pigment load: each pigment has a "drop" value (0–20 ml per 100ml base).
  Total volume = 100 (base) + sum(drops).
  Each channel: result = (255*100 + sum(pigment_rgb * drop)) / totalVol
  We search over:
    - which 1–3 pigments to use
    - how many ml of each (0.5 steps up to 20ml per pigment)
*/
const MAX_DROP = 150;  /* real paint: dark colours need 100+ ml pigment per 100ml base */
const DROP_STEP = 0.5;

function simulateMix(drops) {
  /* drops: array of {rgb, ml} */
  let r=255*100, g=255*100, b=255*100, vol=100;
  drops.forEach(d => {
    r += d.rgb.r * d.ml;
    g += d.rgb.g * d.ml;
    b += d.rgb.b * d.ml;
    vol += d.ml;
  });
  return { r:r/vol, g:g/vol, b:b/vol };
}

/* Can this target even be reached from white by adding pigments?
   Since adding pigment always darkens/shifts from white, targets
   brighter than white or perfectly white are trivially reachable.
   True impossibles: neon/fluorescent colours whose saturation
   exceeds what subtractive pigment can produce. */
const UNMAKEABLE_THRESHOLD = 12;

function findBestMix(targetRgb) {
  const n = PRIMARIES.length;
  const prgb = PRIMARIES.map(p => hexToRgb(p.hex));

  /* If target is very close to white, return empty pigment recipe */
  if (rgbDist(targetRgb, WHITE) < 15) {
    return { dist: rgbDist(targetRgb, WHITE), combos: [] };
  }

  let best = { dist: Infinity, combos: [] };

  function tryCombination(indices) {
    const cols = indices.map(i => prgb[i]);
    /* Coarse search first, then refine */
    let bestLocal = { dist: Infinity, mls: indices.map(()=>1) };

    /* Coarse: step 2ml */
    const range = [];
    for (let v = 0; v <= MAX_DROP; v += 5) range.push(v);

    function search(depth, current_mls) {
      if (depth === indices.length) {
        if (current_mls.every(v => v === 0)) return;
        const drops = indices.map((_, i) => ({ rgb: cols[i], ml: current_mls[i] }));
        const mixed = simulateMix(drops);
        const d = rgbDist(targetRgb, mixed);
        if (d < bestLocal.dist) bestLocal = { dist: d, mls: [...current_mls] };
        return;
      }
      for (const v of range) {
        current_mls[depth] = v;
        search(depth+1, current_mls);
      }
    }
    search(0, indices.map(()=>0));

    /* Fine: ±2ml around best in 0.5 steps */
    const fineRange = [];
    for (let dv = -10; dv <= 10; dv += 1) fineRange.push(dv);
    function refine(depth, current_mls) {
      if (depth === indices.length) {
        if (current_mls.every(v => v === 0)) return;
        const drops = indices.map((_, i) => ({ rgb: cols[i], ml: current_mls[i] }));
        const mixed = simulateMix(drops);
        const d = rgbDist(targetRgb, mixed);
        if (d < bestLocal.dist) bestLocal = { dist: d, mls: [...current_mls] };
        return;
      }
      for (const dv of fineRange) {
        const v = Math.max(0, Math.min(MAX_DROP, bestLocal.mls[depth] + dv));
        current_mls[depth] = v;
        refine(depth+1, current_mls);
      }
    }
    refine(0, [...bestLocal.mls]);

    if (bestLocal.dist < best.dist) {
      best = {
        dist: bestLocal.dist,
        combos: indices.map((idx, i) => ({
          name: PRIMARIES[idx].name,
          hex:  PRIMARIES[idx].hex,
          ml:   bestLocal.mls[i]
        })).filter(x => x.ml > 0)
      };
    }
  }

  /* Try 1-pigment */
  for (let a=0; a<n; a++) tryCombination([a]);
  /* Try 2-pigment */
  for (let a=0; a<n; a++) for (let b=a+1; b<n; b++) tryCombination([a,b]);
  /* Try 3-pigment — limit to top 5 nearest primaries for speed */
  const ranked = prgb.map((p,i) => ({ i, d:rgbDist(targetRgb,p) }))
    .sort((a,b)=>a.d-b.d).slice(0,5).map(x=>x.i);
  for (let a=0; a<ranked.length; a++)
  for (let b=a+1; b<ranked.length; b++)
  for (let c=b+1; c<ranked.length; c++)
    tryCombination([ranked[a],ranked[b],ranked[c]]);

  return best;
}

function qualityLabel(dist) {
  if (dist < 8)  return { text:"Excellent match", color:"#22c55e" };
  if (dist < 16) return { text:"Good match",      color:"#84cc16" };
  if (dist < 22) return { text:"Close match",     color:"#fbbf24" };
  return                { text:"Approximate",     color:"#f87171" };
}

function whyUnmakeable(targetRgb) {
  const { r, g, b } = targetRgb;
  const maxC = Math.max(r,g,b), minC = Math.min(r,g,b);
  const sat = maxC > 0 ? (maxC-minC)/maxC : 0;
  if (sat > 0.85 && maxC > 200) return "This is a highly saturated colour. Physical pigments added to a white base can't reach this vibrancy through subtractive mixing.";
  if (r>210 && g>210 && b<80)   return "Bright neon yellows fall outside the gamut of subtractive pigment mixing.";
  if (r<30  && g>190 && b<30)   return "Neon greens require fluorescent pigments not achievable with these primaries.";
  if (r<30  && g<30  && b>210)  return "Electric blues exceed what adding pigment to a white base can produce.";
  return "This colour sits outside the achievable gamut. A fluorescent or specialist pigment would be needed.";
}

/* ── UI ── */
function onPickerChange(val) {
  document.getElementById("hexInput").value = val.toUpperCase();
}
function onHexType(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) document.getElementById("colorPicker").value = val;
}
function showPreview(hex) {
  document.getElementById("preview").style.background = hex;
  const lbl = document.getElementById("previewLabel");
  lbl.textContent = hex.toUpperCase();
  lbl.style.display = "block";
}

function showResult(hex, result) {
  const unmakeable = result.dist > UNMAKEABLE_THRESHOLD;
  const q = qualityLabel(result.dist);
  const combos = result.combos;

  document.getElementById("swatch").style.background = hex;
  document.getElementById("cname").textContent = unmakeable ? "Can't be matched" : "Recipe found";
  document.getElementById("csub").textContent  = unmakeable
    ? "Outside gamut of these primaries"
    : `${combos.length} pigment${combos.length!==1?'s':''} into white base`;
  document.getElementById("chex").textContent  = hex.toUpperCase();
  document.getElementById("cquality").innerHTML =
    `<span class="match-quality"><span class="quality-dot" style="background:${q.color}"></span>${q.text}</span>`;

  const rgrid = document.getElementById("rgrid");
  if (!unmakeable && combos.length) {
    rgrid.innerHTML = combos.map(item => `
      <div class="recipe-cell">
        <div class="recipe-color-bar" style="background:${item.hex}"></div>
        <div class="recipe-label">${item.name}</div>
        <div class="recipe-val">${item.ml.toFixed(1)} <span style="font-size:11px;font-weight:400">ml</span></div>
      </div>`).join("");
    rgrid.style.display = "";
  } else {
    rgrid.innerHTML = "";
    rgrid.style.display = "none";
  }

  const ubox = document.getElementById("unmakeable-box");
  if (unmakeable) {
    document.getElementById("unmakeable-msg").innerHTML =
      `<strong>Can't be made with these primaries.</strong><br>${whyUnmakeable(hexToRgb(hex))}`;
    ubox.style.display = "flex";
  } else {
    ubox.style.display = "none";
  }

  document.getElementById("recipe-hint").textContent = unmakeable
    ? "" : "ml values are per 100 ml of white base. Mix pigments into base thoroughly.";

  document.getElementById("empty").style.display = "none";
  document.getElementById("meta").style.display  = "block";
  document.getElementById("scaleCard").style.display = unmakeable ? "none" : "block";
  document.getElementById("pills").innerHTML = "";
}

function generateRecipe() {
  const err = document.getElementById("searcherr");
  err.textContent = "";
  let val = document.getElementById("hexInput").value.trim();
  if (!val) val = document.getElementById("colorPicker").value;
  if (!/^#[0-9a-fA-F]{6}$/i.test(val)) {
    err.textContent = "Please enter a valid hex code, e.g. #D6CF8D";
    return;
  }
  val = val.toUpperCase();
  showPreview(val);
  const result = findBestMix(hexToRgb(val));
  current = { hex: val, result };
  showResult(val, result);
}

function doScale() {
  if (!current || !current.result.combos.length) return;
  const base = parseFloat(document.getElementById("vol").value);
  if (isNaN(base) || base <= 0) return;
  const factor = base / 100;
  document.getElementById("pills").innerHTML = current.result.combos.map(item =>
    `<div class="pill">
      <span class="pill-dot" style="background:${item.hex}"></span>
      ${item.name} <strong>${(item.ml * factor).toFixed(1)} ml</strong>
    </div>`
  ).join("");
}
</script>
</body>
</html>
