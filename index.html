<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Match Workshop</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --muted: #888;
  --faint: #bbb;
  --chip: #f1f1f1;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-pill: 99px;
  --accent: #2a6fdb;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111113;
    --surface: #1c1c1e;
    --border: #2e2e30;
    --text: #f0f0f0;
    --muted: #888;
    --faint: #555;
    --chip: #2a2a2c;
  }
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}

.app {
  max-width: 560px;
  margin: 0 auto;
  padding: 1.25rem 1rem 3rem;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 1.25rem;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header span { font-size: 13px; color: var(--muted); }

/* Primaries reference card */
.primaries-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}
.palette-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
}
.primaries-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
}
.primary-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.primary-dot {
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.primary-dot.white-dot { border: 1px solid var(--border); }
.primary-name {
  font-size: 9px;
  text-align: center;
  color: var(--muted);
  line-height: 1.2;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

/* Search card */
.search-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.input-row input[type="text"] {
  flex: 1;
  min-width: 0;
  padding: 10px 12px;
  font-size: 15px;
  font-family: monospace;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  -webkit-appearance: none;
  appearance: none;
  letter-spacing: 0.05em;
}
.input-row input[type="text"]::placeholder { color: var(--faint); font-family: inherit; letter-spacing: 0; }
.input-row input[type="text"]:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
.input-row input[type="color"] {
  width: 44px;
  height: 42px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: none;
  cursor: pointer;
  padding: 2px;
  flex-shrink: 0;
  -webkit-appearance: none;
  appearance: none;
}
.btn {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  flex-shrink: 0;
}
.btn:active { opacity: 0.7; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.error { font-size: 13px; color: #b91c1c; margin-top: 8px; }
.note  { font-size: 12px; color: var(--faint); margin-top: 8px; font-style: italic; }

/* Preview */
.preview {
  border-radius: var(--radius-md);
  height: 80px;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  background: var(--chip);
  transition: background 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.preview-label {
  font-size: 13px;
  font-family: monospace;
  color: rgba(255,255,255,0.8);
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  letter-spacing: 0.08em;
  display: none;
}

/* Result card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}
.color-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.swatch {
  width: 52px;
  height: 52px;
  flex-shrink: 0;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chip);
  transition: background 0.3s;
}
.color-name { font-size: 16px; font-weight: 600; }
.color-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; }
.color-hex  { font-size: 12px; font-family: monospace; color: var(--faint); margin-top: 2px; }

.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
  gap: 8px;
  margin-top: 1rem;
}
.recipe-cell {
  background: var(--chip);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
  position: relative;
}
.recipe-color-bar {
  width: 100%;
  height: 4px;
  border-radius: 2px;
  margin-bottom: 7px;
}
.recipe-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--faint);
}
.recipe-val {
  font-size: 17px;
  font-weight: 600;
  margin-top: 3px;
  color: var(--text);
}

.unmakeable {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px;
  background: #fff8f0;
  border: 1px solid #fdd5a0;
  border-radius: var(--radius-sm);
  margin-top: 1rem;
}
@media (prefers-color-scheme: dark) {
  .unmakeable { background: #2a1f0e; border-color: #6b4100; }
}
.unmakeable-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
.unmakeable-text { font-size: 13px; line-height: 1.6; color: var(--text); }
.unmakeable-text strong { font-weight: 600; }

.hint { font-size: 12px; color: var(--faint); margin-top: 10px; }
.empty {
  font-size: 14px;
  color: var(--faint);
  text-align: center;
  padding: 1.5rem 0;
}
.match-quality {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: var(--radius-pill);
  margin-top: 5px;
  border: 1px solid var(--border);
}
.quality-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Scale */
.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.scale-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.scale-row input[type="number"] {
  width: 100px;
  padding: 9px 12px;
  font-size: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  -webkit-appearance: none;
  appearance: none;
}
.scale-row input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
.scale-row .unit { font-size: 13px; color: var(--muted); }
.pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.pill {
  font-size: 13px;
  padding: 5px 11px;
  border-radius: var(--radius-pill);
  background: var(--chip);
  color: var(--muted);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pill strong { font-weight: 600; color: var(--text); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Match Workshop</h1>
    <span>By Creatis</span>
  </div>

  <!-- Primaries reference -->
  <div class="primaries-card">
    <div class="palette-label">Available primaries</div>
    <div class="primaries-grid" id="primariesGrid"></div>
  </div>

  <!-- Hex input -->
  <div class="search-card">
    <div class="palette-label">Enter target color</div>
    <div class="input-row">
      <input type="color" id="colorPicker" value="#e2725b" oninput="onPickerChange(this.value)" />
      <input type="text" id="hexInput" placeholder="#E2725B" maxlength="7"
        oninput="onHexType(this.value)"
        onkeydown="if(event.key==='Enter') generateRecipe()" />
      <button class="btn btn-primary" onclick="generateRecipe()">Match</button>
    </div>
    <div id="searcherr" class="error"></div>
    <p class="note">Colors on screen may differ from physical paint results.</p>
  </div>

  <!-- Preview bar -->
  <div id="preview" class="preview">
    <span id="previewLabel" class="preview-label"></span>
  </div>

  <!-- Result -->
  <div class="card">
    <div id="empty" class="empty">Enter a hex code above to generate a mixing recipe.</div>
    <div id="meta" style="display:none">
      <div class="color-row">
        <div id="swatch" class="swatch"></div>
        <div>
          <div id="cname" class="color-name"></div>
          <div id="csub"  class="color-sub"></div>
          <div id="chex"  class="color-hex"></div>
          <div id="cquality"></div>
        </div>
      </div>
      <div id="rgrid" class="recipe-grid"></div>
      <div id="unmakeable-box" style="display:none" class="unmakeable">
        <span class="unmakeable-icon">⚠</span>
        <div class="unmakeable-text" id="unmakeable-msg"></div>
      </div>
      <p class="hint" id="recipe-hint"></p>
    </div>
  </div>

  <!-- Scale -->
  <div class="card" id="scaleCard" style="display:none">
    <div class="section-label">Scale recipe</div>
    <div class="scale-row">
      <input id="vol" type="number" inputmode="decimal" value="100" min="1" />
      <span class="unit">ml total</span>
      <button class="btn" onclick="doScale()">Scale</button>
    </div>
    <div id="pills" class="pills"></div>
  </div>

</div>
<script>
/* ── Primary colors ── */
const PRIMARIES = [
  { name:"Yellow",  hex:"#F5C518" },
  { name:"Orange",  hex:"#F07020" },
  { name:"Red",     hex:"#D0231A" },
  { name:"Blue",    hex:"#1A52B0" },
  { name:"Purple",  hex:"#6B3A9E" },
  { name:"Black",   hex:"#1A1A1A" },
  { name:"Green",   hex:"#2E8B3A" },
  { name:"Brown",   hex:"#7B4A1E" }
];

/* Build primaries reference strip */
const pg = document.getElementById("primariesGrid");
PRIMARIES.forEach(p => {
  const chip = document.createElement("div");
  chip.className = "primary-chip";
  chip.innerHTML = `
    <div class="primary-dot${p.hex==='#ffffff'?' white-dot':''}" style="background:${p.hex}"></div>
    <div class="primary-name">${p.name}</div>`;
  pg.appendChild(chip);
});

let current = null;

/* ── Colour math ── */
function hexToRgb(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}
function rgbDist(a, b) {
  /* weighted Euclidean closer to human perception */
  const dr = a.r - b.r, dg = a.g - b.g, db = a.b - b.b;
  return Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
}
function mixRgb(colors, weights) {
  let r=0,g=0,b=0, total=0;
  colors.forEach((c,i) => { r+=c.r*weights[i]; g+=c.g*weights[i]; b+=c.b*weights[i]; total+=weights[i]; });
  return { r:r/total, g:g/total, b:b/total };
}

/* Determine if a color is even theoretically reachable with these primaries.
   Strategy: check if target lies "inside" the convex span of our primaries
   by seeing if the best possible mix gets within a reasonable distance. */
const UNMAKEABLE_THRESHOLD = 55; /* perceptual distance above which we warn */

/* Find best N-component mix (N=1..4) using gradient-friendly search */
function findBestMix(targetRgb) {
  const n = PRIMARIES.length;
  const prgb = PRIMARIES.map(p => hexToRgb(p.hex));

  let best = { dist: Infinity, indices: [], weights: [] };

  /* Try all combinations of 1–4 primaries */
  function tryCombo(indices) {
    const cols = indices.map(i => prgb[i]);
    /* Iterative proportional search — coarse then fine */
    const steps = [20, 5, 1];
    let bestW = null, bestD = Infinity;

    if (indices.length === 1) {
      const d = rgbDist(targetRgb, cols[0]);
      if (d < best.dist) best = { dist: d, indices, weights: [100] };
      return;
    }

    /* Generate weight combos that sum to 100 */
    function* genWeights(k, total, step) {
      if (k === 1) { yield [total]; return; }
      for (let w = step; w <= total - (k-1)*step; w += step) {
        for (const rest of genWeights(k-1, total-w, step)) {
          yield [w, ...rest];
        }
      }
    }

    for (const step of steps) {
      for (const ws of genWeights(indices.length, 100, step)) {
        const mix = mixRgb(cols, ws);
        const d = rgbDist(targetRgb, mix);
        if (d < bestD) { bestD = d; bestW = [...ws]; }
      }
    }
    if (bestD < best.dist) best = { dist: bestD, indices, weights: bestW };
  }

  /* 1-component */
  for (let a=0; a<n; a++) tryCombo([a]);
  /* 2-component */
  for (let a=0; a<n; a++) for (let b=a+1; b<n; b++) tryCombo([a,b]);
  /* 3-component */
  for (let a=0; a<n; a++) for (let b=a+1; b<n; b++) for (let c=b+1; c<n; c++) tryCombo([a,b,c]);
  /* 4-component — only top candidates to keep it fast */
  /* Pre-rank primaries by individual distance, take top 5, combo those */
  const ranked = prgb.map((p,i) => ({ i, d: rgbDist(targetRgb, p) }))
    .sort((a,b) => a.d - b.d).slice(0,5).map(x => x.i);
  for (let a=0; a<ranked.length; a++)
  for (let b=a+1; b<ranked.length; b++)
  for (let c=b+1; c<ranked.length; c++)
  for (let d=c+1; d<ranked.length; d++)
    tryCombo([ranked[a],ranked[b],ranked[c],ranked[d]]);

  return best;
}

function qualityLabel(dist) {
  if (dist < 15) return { text:"Excellent match", color:"#22c55e" };
  if (dist < 30) return { text:"Good match",      color:"#86efac" };
  if (dist < 50) return { text:"Close match",     color:"#fbbf24" };
  return               { text:"Approximate",      color:"#f87171" };
}

function isUnmakeable(dist) { return dist > UNMAKEABLE_THRESHOLD; }

function whyUnmakeable(targetRgb) {
  const { r, g, b } = targetRgb;
  /* Highly saturated colours outside primary gamut */
  const maxC = Math.max(r, g, b), minC = Math.min(r, g, b);
  const sat = maxC > 0 ? (maxC - minC) / maxC : 0;
  if (sat > 0.85 && maxC > 200) return "This color is highly saturated — physical pigments can't reach this vibrancy with subtractive mixing.";
  if (r > 220 && g > 220 && b < 80) return "Bright neon yellows fall outside the gamut of subtractive primary mixing.";
  if (r < 30 && g > 200 && b < 30)  return "Neon greens require fluorescent pigments not achievable with standard primaries.";
  if (r < 30 && g < 30 && b > 220)  return "Bright electric blues exceed what subtractive mixing can produce with these primaries.";
  return "This color sits outside the gamut achievable by mixing these 8 primaries. A specialist or fluorescent pigment would be needed.";
}

/* ── UI helpers ── */
function onPickerChange(val) {
  document.getElementById("hexInput").value = val.toUpperCase();
}
function onHexType(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    document.getElementById("colorPicker").value = val;
  }
}

function showPreview(hex) {
  const el = document.getElementById("preview");
  const lbl = document.getElementById("previewLabel");
  el.style.background = hex;
  lbl.textContent = hex.toUpperCase();
  lbl.style.display = "block";
}

function showResult(hex, recipe, dist) {
  const unmakeable = isUnmakeable(dist);
  const q = qualityLabel(dist);

  document.getElementById("swatch").style.background = hex;
  document.getElementById("cname").textContent = unmakeable ? "No exact match" : "Recipe found";
  document.getElementById("csub").textContent  = unmakeable ? "Best approximation shown below" : `${recipe.length} primary${recipe.length>1?'s':''} · dist ${Math.round(dist)}`;
  document.getElementById("chex").textContent  = hex.toUpperCase();

  /* Quality badge */
  const qEl = document.getElementById("cquality");
  qEl.innerHTML = `<span class="match-quality"><span class="quality-dot" style="background:${q.color}"></span>${q.text}</span>`;

  /* Recipe grid */
  const rgrid = document.getElementById("rgrid");
  if (!unmakeable || dist < 80) {
    rgrid.innerHTML = recipe.map(item => `
      <div class="recipe-cell">
        <div class="recipe-color-bar" style="background:${item.hex}"></div>
        <div class="recipe-label">${item.name}</div>
        <div class="recipe-val">${item.pct}%</div>
      </div>`).join("");
    rgrid.style.display = "";
  } else {
    rgrid.style.display = "none";
  }

  /* Unmakeable warning */
  const ubox = document.getElementById("unmakeable-box");
  const umsg = document.getElementById("unmakeable-msg");
  if (unmakeable) {
    umsg.innerHTML = `<strong>Can't be made with available primaries.</strong><br>${whyUnmakeable(hexToRgb(hex))}`;
    ubox.style.display = "flex";
  } else {
    ubox.style.display = "none";
  }

  document.getElementById("recipe-hint").textContent = unmakeable
    ? "" : "Percentages are by volume. Mix thoroughly before use.";

  document.getElementById("empty").style.display = "none";
  document.getElementById("meta").style.display  = "block";
  document.getElementById("scaleCard").style.display = unmakeable ? "none" : "block";
  document.getElementById("pills").innerHTML = "";
}

function generateRecipe() {
  const err = document.getElementById("searcherr");
  err.textContent = "";

  let val = document.getElementById("hexInput").value.trim();
  if (!val) val = document.getElementById("colorPicker").value;
  if (!/^#[0-9a-fA-F]{6}$/i.test(val)) {
    err.textContent = "Please enter a valid hex code, e.g. #E2725B";
    return;
  }
  val = val.toUpperCase();
  const targetRgb = hexToRgb(val);
  showPreview(val);

  const result = findBestMix(targetRgb);

  /* Build recipe array (filter out near-zero weights) */
  const recipe = result.indices
    .map((idx, i) => ({ name: PRIMARIES[idx].name, hex: PRIMARIES[idx].hex, pct: result.weights[i] }))
    .filter(x => x.pct >= 1)
    .sort((a,b) => b.pct - a.pct);

  /* Renormalise to 100 after filtering */
  const total = recipe.reduce((s,x) => s+x.pct, 0);
  recipe.forEach(x => x.pct = Math.round(x.pct / total * 100));
  /* Fix rounding drift */
  const drift = recipe.reduce((s,x) => s+x.pct, 0) - 100;
  if (recipe.length) recipe[0].pct -= drift;

  current = { hex: val, recipe, dist: result.dist };
  showResult(val, recipe, result.dist);
}

function doScale() {
  if (!current || !current.recipe.length) return;
  const vol = parseFloat(document.getElementById("vol").value);
  if (isNaN(vol) || vol <= 0) return;
  document.getElementById("pills").innerHTML = current.recipe.map(item =>
    `<div class="pill">
      <span class="pill-dot" style="background:${item.hex}"></span>
      ${item.name} <strong>${(vol * item.pct / 100).toFixed(1)} ml</strong>
    </div>`
  ).join("");
}
</script>
</body>
</html>
